<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:;">
<title>ACE AI Knowledge Base</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;transition:background .3s,color .3s}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
pre{tab-size:2}
button{cursor:pointer}
:root{
  --bg:#f9fafb;--surface:#fff;--surface2:#f3f4f6;--border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#00897B;--accent-dark:#00695C;--accent-light:#e0f2f1;--accent-text:#00796B;
  --green-bg:#ecfdf5;--green-border:#a7f3d0;--green-text:#047857;--green-head:#065f46;
  --red-bg:#fef2f2;--red-border:#fecaca;--red-text:#b91c1c;--red-head:#991b1b;
  --blue-bg:#eff6ff;--blue-border:#bfdbfe;--blue-text:#1d4ed8;--blue-head:#1e40af;
  --yellow-bg:#fffbeb;--yellow-border:#fde68a;--yellow-text:#92400e;--yellow-head:#78350f;
  --code-bg:#f9fafb;--code-border:#e5e7eb;--code-text:#374151;
  --cat-prompt-bg:#d1fae5;--cat-prompt-text:#065f46;
  --cat-skill-bg:#ede9fe;--cat-skill-text:#5b21b6;
  --cat-guide-bg:#dbeafe;--cat-guide-text:#1e40af;
  --cat-example-bg:#fef3c7;--cat-example-text:#92400e;
  --card-hover-shadow:0 8px 25px rgba(0,0,0,0.1);
  --header-grad:linear-gradient(135deg,#00695C,#00897B,#059669);
  --vote-bg:#f3f4f6;--vote-active:#00897B;
  --banner-bg:#fffbeb;--banner-border:#fde68a;--banner-text:#92400e;
}
.dark{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--border2:#64748b;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#2dd4bf;--accent-dark:#14b8a6;--accent-light:rgba(45,212,191,0.15);--accent-text:#5eead4;
  --green-bg:rgba(16,185,129,0.15);--green-border:rgba(16,185,129,0.3);--green-text:#6ee7b7;--green-head:#34d399;
  --red-bg:rgba(239,68,68,0.15);--red-border:rgba(239,68,68,0.3);--red-text:#fca5a5;--red-head:#f87171;
  --blue-bg:rgba(59,130,246,0.15);--blue-border:rgba(59,130,246,0.3);--blue-text:#93c5fd;--blue-head:#60a5fa;
  --yellow-bg:rgba(245,158,11,0.15);--yellow-border:rgba(245,158,11,0.3);--yellow-text:#fcd34d;--yellow-head:#fbbf24;
  --code-bg:#0f172a;--code-border:#475569;--code-text:#e2e8f0;
  --cat-prompt-bg:rgba(16,185,129,0.2);--cat-prompt-text:#6ee7b7;
  --cat-skill-bg:rgba(139,92,246,0.2);--cat-skill-text:#c4b5fd;
  --cat-guide-bg:rgba(59,130,246,0.2);--cat-guide-text:#93c5fd;
  --cat-example-bg:rgba(245,158,11,0.2);--cat-example-text:#fcd34d;
  --card-hover-shadow:0 8px 25px rgba(0,0,0,0.4);
  --header-grad:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
  --vote-bg:#334155;--vote-active:#2dd4bf;
  --banner-bg:rgba(245,158,11,0.15);--banner-border:rgba(245,158,11,0.3);--banner-text:#fcd34d;
}
body{background:var(--bg);color:var(--text)}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.sync-dot.connected{background:#10b981}.sync-dot.local{background:#f59e0b}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
